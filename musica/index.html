
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musica - Tesina</title>
    <!-- Tailwind CSS per layout elegante e token di design moderni -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configurazione di Tailwind per utilizzare la modalità scura basata su classi anziché sulle preferenze di sistema
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        /* Transizioni fluide accelerate in hardware */
        .smooth-transition {
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Tipografia fluida per il titolo: varia in sicurezza tra 2rem e 4rem */
        .fluid-title {
            font-size: clamp(2rem, 4vw + 1rem, 4rem);
            line-height: 1.15;
        }

        /* Tipografia fluida per i sottotitoli: varia in sicurezza tra 1.25rem and 2rem */
        .fluid-subtitle {
            font-size: clamp(1.25rem, 2vw + 0.8rem, 2rem);
            line-height: 1.3;
        }

        /* Tipografia fluida per il testo del corpo principale: ottimale per la lettura */
        .fluid-body-text {
            font-size: clamp(1rem, 0.6vw + 0.8rem, 1.25rem);
            line-height: 1.75;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition">

    <!-- Navigazione superiore / Indicatore di progresso -->
    <header id="appHeader" class="w-full fixed top-0 left-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-900/80 z-50 smooth-transition">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <span id="logoText" class="text-xs font-mono tracking-widest text-slate-400">ARGOMENTI</span>
            
            <!-- Controlli stile (Opzioni di download e tema) -->
            <div class="flex items-center gap-2">
                <!-- Pulsante Scarica File di Testo -->
                <button onclick="downloadText()" id="downloadBtn" class="p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition" title="Scarica il testo">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </button>

                <!-- Selettore del Tema di Colore -->
                <button onclick="toggleTheme()" id="themeBtn" class="p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition">
                    <!-- Icona dinamica caricata via JavaScript in base al tema corrente -->
                    <svg id="themeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Barra di Progresso Scorrimento -->
        <div class="w-full h-[2px] bg-slate-900/50">
            <div id="progressBar" class="h-full w-0 bg-indigo-500 transition-all duration-100"></div>
        </div>
    </header>

    <!-- Contenitore Principale -->
    <main class="flex-1 w-full max-w-3xl mx-auto px-6 pt-28 pb-16">
        <article id="readingContent" class="space-y-8">
            
            <!-- Intestazione dell'Articolo -->
            <div id="articleHeader" class="space-y-6 pb-6 border-b border-slate-900/80 smooth-transition">
                <div class="space-y-2">
                    <h1 id="headingDisplay" class="fluid-title font-black tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent smooth-transition">
                        Gli artisti russi nel 1800
                    </h1>
                    <p id="metaText" class="text-xs font-mono text-indigo-400 uppercase tracking-wider">Musica</p>
                </div>
            </div>

            <!-- Area del Testo del Corpo Principale -->
            <div id="bodyDisplay" class="fluid-body-text text-slate-300 space-y-6 opacity-100 transition-opacity duration-300 smooth-transition">
                <!-- Il contenuto viene caricato ed elaborato dinamicamente qui -->
            </div>
        </article>
    </main>

    <!-- Piè di pagina -->
    <footer id="appFooter" class="w-full text-center py-8 text-[10px] text-slate-600 font-mono select-none border-t border-slate-900/60 max-w-4xl mx-auto smooth-transition">
        GABRIELE BRANCIFORTI • TESINA • 3C
    </footer>

    <!-- Logica di Scripting dell'Applicazione -->
    <script>
        // Temi supportati: 'dark', 'light'
        const state = {
            theme: 'dark'
        };

        // Declarazione dell'oggetto globale DOM per evitare errori di riferimento (ReferenceError)
        let DOM = {};

        // Saggio Completo Esteso
        const extendedData = `Nel corso dell’Ottocento, l’arte russa visse un momento di profondo cambiamento. Gli artisti smisero di copiare lo stile elegante e accademico che arrivava dall’Europa occidentale, per iniziare a raccontare l'autentica realtà del proprio Paese. Questo secolo fu caratterizzato da un importante dibattito culturale, che si può riassumere nel confronto tra due modi di intendere l’arte: uno basato sulla realtà sociale, le tradizioni e le leggende del popolo, e l’altro incentrato sui sentimenti profondi e sull'interiorità dell'individuo.

#### Musorgskij

Per artisti come il compositore **Modest Musorgskij** e i pittori realisti del tempo, l’arte aveva un compito preciso: riscoprire le radici della Russia, celebrandone la storia, le fiabe popolari e la vita quotidiana, lontana dai salotti aristocratici.

Il legame totale tra queste due arti si realizza nel capolavoro per pianoforte di Musorgskij: ***Quadri di un'esposizione*** (1874). Questa celebre opera musicale nacque come un omaggio a un suo grande amico, il pittore e architetto Viktor Hartmann, morto prematuramente. Musorgskij visitò la mostra commemorativa dei suoi disegni e decise di trasformare quei quadri in musica, creando una vera e propria passeggiata sonora all'interno della galleria d'arte.

Attraverso i vari brani, Musorgskij non cerca la bellezza formale o la perfezione geometrica tipica dell'Europa, ma la verità e la forza espressiva della cultura russa. Tra i movimenti più significativi dell'opera troviamo:

* ***La grande porta di Kiev***: Il brano finale, maestoso e solenne, ispirato al progetto di Hartmann per una porta della città in stile antico russo. Musorgskij inserisce nella musica i suoni delle campane a festa e i canti religiosi ortodossi, celebrando la grandezza storica della Russia.
* ***Babu Yaga (La capanna sulle zampe di gallina)***: Un pezzo travolgente e aggressivo che descrive la dimora della famosa strega delle fiabe popolari russe. Qui la musica si fa ruvida, magica e spaventosa, attingendo direttamente al folclore più autentico.
* ***Il vecchio castello*** e ***Gnomus***: Brani in cui si passa dalla malinconia poetica del canto di un trovatore davanti a un castello medievale, ai movimenti scattanti e grotteschi di uno gnomo, dimostrando la capacità di raccontare la realtà e la fantasia senza filtri.

Ogni quadro è intervallato da un tema chiamato *Promenade* (Passeggiata), che rappresenta lo stesso Musorgskij mentre cammina da un dipinto all'altro: un tema dal ritmo tipicamente russo, che cambia stato d'animo a seconda dell'opera d'arte appena vista.

#### Čajkovskij

Dall'altra parte di questo dibattito culturale si colloca la figura di **Pëtr Il'ič Čajkovskij**. A differenza dei realisti e dei nazionalisti, orientati verso le tradizioni e le leggende della collettività, Čajkovskij scelse la via dell’interiorità, ponendo al centro della sua musica i conflitti dell'animo umano.

Spesso criticato dai contemporanei per l'adozione di strutture musicali vicine alla tradizione europea, Čajkovskij dimostrò che per esprimere lo spirito russo non era indispensabile descrivere fiabe o monumenti nazionali. La sua identità emergeva attraverso una profonda malinconia esistenziale e una costante tensione verso il destino.

Le sue opere teatrali e orchestrali più famose sono celebrate in tutto il mondo:

* I celebri balletti ***Il lago dei cigni*** e ***Lo schiaccianoci***, dove il mondo della favola diventa lo sfondo per esplorare la nostalgia, il sogno e il contrasto eterno tra bene e male.
* La ***Sinfonia n. 6 "Patetica"***, considerata il suo testamento spirituale, in cui il dolore personale e l'angoscia dell'uomo di fronte al proprio destino vengono tradotti in melodie universali, capaci di toccare la sensibilità di ascoltatori di ogni cultura.
`;

        // Funzione per mappare gli elementi del DOM una volta che la pagina è pronta
        function initDOM() {
            DOM = {
                body: document.body,
                appHeader: document.getElementById('appHeader'),
                logoText: document.getElementById('logoText'),
                themeBtn: document.getElementById('themeBtn'),
                themeIcon: document.getElementById('themeIcon'),
                downloadBtn: document.getElementById('downloadBtn'),
                progressBar: document.getElementById('progressBar'),
                articleHeader: document.getElementById('articleHeader'),
                headingDisplay: document.getElementById('headingDisplay'),
                metaText: document.getElementById('metaText'),
                bodyDisplay: document.getElementById('bodyDisplay'),
                appFooter: document.getElementById('appFooter')
            };
        }

        // Analisi sicura della formattazione inline elementare (grassetto, corsivo)
        function parseInlineFormatting(text) {
            let result = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");

            // Riconoscimento del grassetto Markdown **testo** (usa classi specifiche per il tema)
            result = result.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-black dark:text-white">$1</strong>');
            // Riconoscimento del corsivo Markdown *testo*
            result = result.replace(/\*(.*?)\*/g, '<em class="italic text-black dark:text-slate-200">$1</em>');
            
            return result;
        }

        // Motore di formattazione automatica e rendering strutturato
        function renderBodyText(textString) {
            if (!DOM || !DOM.bodyDisplay) return;

            DOM.bodyDisplay.innerHTML = '';
            const cleanData = textString.replace(/\r\n/g, '\n');
            const blocks = cleanData.split(/\n\s*\n+/);

            blocks.forEach(block => {
                const trimmedBlock = block.trim();
                if (!trimmedBlock) return;

                const lines = trimmedBlock.split('\n');
                const isBulletList = lines.every(line => /^\s*[•\-\*\d+\.]/.test(line.trim()));

                if (isBulletList && lines.length > 1) {
                    const ul = document.createElement('ul');
                    ul.className = 'space-y-4 my-6 pl-2 list-none smooth-transition';

                    lines.forEach(line => {
                        const li = document.createElement('li');
                        li.className = 'relative pl-6 text-black dark:text-slate-300 transition-colors duration-300';
                        
                        const marker = document.createElement('span');
                        marker.className = 'absolute left-0 top-2.5 w-1.5 h-1.5 rounded-full bg-indigo-500';
                        li.appendChild(marker);

                        const cleanLine = line.replace(/^\s*[•\-\*\d+\.]\s*/, '').trim();
                        li.innerHTML += parseInlineFormatting(cleanLine);
                        ul.appendChild(li);
                    });

                    DOM.bodyDisplay.appendChild(ul);
                } else {
                    if (trimmedBlock.startsWith('#')) {
                        const level = (trimmedBlock.match(/^#+/) || ['#'])[0].length;
                        const cleanText = trimmedBlock.replace(/^#+\s*/, '');
                        
                        const heading = document.createElement(level === 1 ? 'h1' : 'h2');
                        heading.className = level === 1 ? 'fluid-title font-black tracking-tight mt-8 mb-4' : 'fluid-subtitle font-bold text-black dark:text-white pt-6 pb-2';
                        heading.innerHTML = parseInlineFormatting(cleanText);
                        DOM.bodyDisplay.appendChild(heading);
                    }
                    else if (trimmedBlock.startsWith('**') && trimmedBlock.endsWith('**') && trimmedBlock.length < 120) {
                        const cleanText = trimmedBlock.replace(/^\*\*|\*\*$/g, '');
                        const h3 = document.createElement('h3');
                        h3.className = 'text-lg md:text-xl font-bold text-indigo-600 dark:text-indigo-400 pt-6 pb-2';
                        h3.innerHTML = parseInlineFormatting(cleanText);
                        DOM.bodyDisplay.appendChild(h3);
                    }
                    else {
                        const p = document.createElement('p');
                        p.className = 'smooth-transition text-black dark:text-slate-300 leading-relaxed';
                        p.innerHTML = parseInlineFormatting(trimmedBlock).replace(/\n/g, '<br>');
                        DOM.bodyDisplay.appendChild(p);
                    }
                }
            });
        }

        // Compilazione del file plain text e attivazione del download nel browser
        function downloadText() {
            if (!DOM || !DOM.headingDisplay || !DOM.bodyDisplay) return;

            const title = DOM.headingDisplay.innerText || DOM.headingDisplay.textContent;
            let textContent = "";
            const paragraphs = DOM.bodyDisplay.querySelectorAll('p, li, h1, h2, h3');

            if (paragraphs.length > 0) {
                paragraphs.forEach(el => {
                    if (el.tagName === 'LI') {
                        textContent += "• " + el.innerText + "\n";
                    } else if (el.tagName.startsWith('H')) {
                        textContent += "\n" + el.innerText.toUpperCase() + "\n----------------\n";
                    } else {
                        textContent += el.innerText + "\n\n";
                    }
                });
            } else {
                textContent = DOM.bodyDisplay.innerText || DOM.bodyDisplay.textContent;
            }

            const finalString = `${title.toUpperCase()}\n============================\n\n${textContent.trim()}`;
            
            const blob = new Blob([finalString], { type: "text/plain;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            const fileName = `${title.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')}`;
                
            link.href = url;
            link.setAttribute("download", `${fileName}.txt`);
            document.body.appendChild(link);
            link.click();
            
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Gestisce e aggiorna la barra di avanzamento dello scorrimento
        function updateProgressBar() {
            if (!DOM || !DOM.progressBar) return;
            const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            DOM.progressBar.style.width = scrolled + "%";
        }

        window.addEventListener('scroll', updateProgressBar);

        // Motore per il rilevamento del tema di sistema chiaro/scuro
        function detectSystemTheme() {
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            
            // Applica la preferenza iniziale del sistema
            setTheme(systemPrefersDark.matches ? 'dark' : 'light');

            // Resta in ascolto di eventuali modifiche dinamiche al tema del sistema
            systemPrefersDark.addEventListener('change', (e) => {
                setTheme(e.matches ? 'dark' : 'light');
            });
        }

        // Configura gli stili per il tema selezionato ('light' o 'dark')
        function setTheme(newTheme) {
            state.theme = newTheme;
            if (!DOM || !DOM.body) return;

            if (newTheme === 'light') {
                // Rimuove la classe dark dall'elemento HTML radice
                document.documentElement.classList.remove('dark');

                // Tema Chiaro (Ottimizzato con testo nero assoluto nel corpo)
                DOM.body.className = "bg-slate-50 text-black min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition";
                DOM.appHeader.className = "w-full fixed top-0 left-0 bg-white/90 backdrop-blur-md border-b border-slate-200/80 z-50 smooth-transition";
                DOM.logoText.className = "text-xs font-mono tracking-widest text-slate-600 font-semibold";
                
                DOM.downloadBtn.className = "p-2 rounded-xl bg-slate-100 border border-slate-200 hover:bg-slate-200 text-slate-600 hover:text-black transition-all smooth-transition";
                DOM.themeBtn.className = "p-2 rounded-xl bg-slate-100 border border-slate-200 hover:bg-slate-200 text-slate-600 hover:text-black transition-all smooth-transition";

                DOM.articleHeader.className = "space-y-6 pb-6 border-b border-slate-200 smooth-transition";
                DOM.headingDisplay.className = "fluid-title font-black tracking-tight bg-gradient-to-r from-slate-950 via-slate-800 to-slate-700 bg-clip-text text-transparent smooth-transition";
                DOM.metaText.className = "text-xs font-mono text-indigo-700 uppercase tracking-wider font-semibold";
                DOM.bodyDisplay.className = "fluid-body-text text-black space-y-6 smooth-transition";
                DOM.appFooter.className = "w-full text-center py-8 text-[10px] text-slate-500 font-mono select-none border-t border-slate-200 max-w-4xl mx-auto smooth-transition";
                
                // Icona Luna per l'opzione di passaggio al tema scuro
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            } 
            else if (newTheme === 'dark') {
                // Aggiunge la classe dark all'elemento HTML radice
                document.documentElement.classList.add('dark');

                // Tema Scuro Classico (Slate-950)
                DOM.body.className = "bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition";
                DOM.appHeader.className = "w-full fixed top-0 left-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-900/80 z-50 smooth-transition";
                DOM.logoText.className = "text-xs font-mono tracking-widest text-slate-400";
                
                DOM.downloadBtn.className = "p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition";
                DOM.themeBtn.className = "p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition";

                DOM.articleHeader.className = "space-y-6 pb-6 border-b border-slate-900 smooth-transition";
                DOM.headingDisplay.className = "fluid-title font-black tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent smooth-transition";
                DOM.metaText.className = "text-xs font-mono text-indigo-400 uppercase tracking-wider";
                DOM.bodyDisplay.className = "fluid-body-text text-slate-300 space-y-6 smooth-transition";
                DOM.appFooter.className = "w-full text-center py-8 text-[10px] text-slate-600 font-mono select-none border-t border-slate-900/60 max-w-4xl mx-auto smooth-transition";
                
                // Icona Sole per l'opzione di passaggio al tema chiaro
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>`;
            } 
            
            // Ri-renderizza il testo per applicare correttamente le modifiche cromatiche inline
            renderBodyText(extendedData);
        }

        // Commutazione manuale del tema avviata tramite click sull'icona
        function toggleTheme() {
            if (state.theme === 'light') {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }

        // Avvio di tutte le componenti al caricamento completo della finestra
        window.onload = function() {
            initDOM(); // Mappa gli elementi HTML nell'oggetto globale DOM prima di eseguire qualsiasi logica
            renderBodyText(extendedData); // Carica il saggio iniziale
            updateProgressBar(); // Calcola la barra di progresso iniziale
            detectSystemTheme(); // Rileva il tema di sistema preferito dell'utente
        };
    </script>
</body>
</html>
