<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chernobyl - Tesina</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden; /* Prevents scrollbars */
        }

        .background-container {
            /* Using the requested image as the background */
            background-image: url("Untitled (3)_page-0002.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Subtle overlay to ensure high readability */
            background-color: rgba(255, 255, 255, 0.1); 
            background-blend-mode: overlay;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
            padding: 0 5vw;
        }

        h1 {
            font-family: 'Russo One', Impact, sans-serif;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.1;
            /* Responsive font sizes based on viewport width */
            font-size: 6.5vw; 
            letter-spacing: 0.2vw;
            margin-bottom: 0.5vh;
        }

        .line1 {
            display: block;
        }

        .line2 {
            display: block;
        }

        h2 {
            font-family: 'Russo One', Impact, sans-serif;
            color: #000000;
            text-transform: uppercase;
            font-size: 2.2vw;
            letter-spacing: 0.15vw;
            margin-top: 1.5vh;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 10vw;
            }
            h2 {
                font-size: 3.5vw;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 13vw;
                line-height: 1.2;
            }
            h2 {
                font-size: 4.5vw;
                margin-top: 2vh;
            }
        }

        /* Styles for the bottom buttons */
        .button-container {
            position: absolute;
            bottom: 5vh;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 4vw;
            padding: 0 5vw;
        }

        .text-button {
            text-decoration: none; /* Prevents default link underline */
            display: inline-block; /* Allows scale transition to work perfectly */
            background: none;
            border: none;
            color: #000000;
            font-family: 'Russo One', Impact, sans-serif;
            font-size: 1.5vw;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.1vw;
            transition: opacity 0.2s, transform 0.2s;
        }

        .text-button:hover {
            opacity: 0.7;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .text-button {
                font-size: 2.5vw;
            }
        }

        @media (max-width: 480px) {
            .button-container {
                gap: 6vw;
            }
            .text-button {
                font-size: 4vw;
            }
        }

        /* Overlay with premium, ultra-smooth transition and subtle blur */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.92); /* Rich deep backdrop */
            backdrop-filter: blur(8px); /* Modern frosted-glass effect */
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            /* Premium Expo curve for a smooth, high-end feel */
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), backdrop-filter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-family: 'Russo One', Impact, sans-serif;
            color: #8b0000; /* Dark crimson red for headers inside overlay */
            font-size: 3vw;
            text-transform: uppercase;
            margin-bottom: 4vh;
            letter-spacing: 0.15vw;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
            text-align: center;
            transform: translateY(-20px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .overlay.active .overlay-title {
            transform: translateY(0);
            opacity: 1;
        }

        /* Map Image container custom smooth scale effect */
        .map-frame {
            max-width: 1100px;
            width: 85%;
            max-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #ffffff;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
            background-color: #000000;
            overflow: hidden;
            border-radius: 4px;
            transform: scale(0.9) translateY(30px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Slide & Pop transition when opened */
        .overlay.active .map-frame {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .map-image {
            max-width: 100%;
            max-height: 68vh;
            object-fit: contain;
            display: block;
        }

        /* Grid to layout the 11 buttons cleanly */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vw;
            max-width: 1100px;
            width: 90%;
            justify-items: center;
            transform: scale(0.9) translateY(30px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .overlay.active .grid-container {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Special alignment for the last row so it looks balanced */
        .grid-container::after {
            content: "";
            grid-column: span 1;
        }

        .subject-button {
            text-decoration: none;
            font-family: 'Russo One', Impact, sans-serif;
            color: #ffffff;
            font-size: 1.3vw;
            text-transform: uppercase;
            border: 2px solid #ffffff;
            padding: 1.5vh 2vw;
            width: 100%;
            text-align: center;
            letter-spacing: 0.1vw;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
            cursor: pointer;
        }

        .subject-button:hover {
            background-color: #8b0000;
            border-color: #8b0000;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.4);
        }

        /* Close button style */
        .close-button {
            position: absolute;
            top: 5vh;
            right: 5vw;
            background: none;
            border: none;
            color: #ffffff;
            font-family: 'Russo One', Impact, sans-serif;
            font-size: 1.5vw;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.1vw;
            transition: color 0.2s, transform 0.2s;
            z-index: 12;
        }

        .close-button:hover {
            color: #8b0000;
            transform: scale(1.1);
        }

        /* Responsive design for the grid & overlay elements */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 3vw;
            }
            .overlay-title {
                font-size: 5vw;
            }
            .subject-button {
                font-size: 2vw;
            }
            .close-button {
                font-size: 2.5vw;
            }
            .map-frame {
                width: 95%;
                max-height: 65vh;
            }
            .map-image {
                max-height: 63vh;
            }
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 4vw;
            }
            .overlay-title {
                font-size: 6vw;
                margin-bottom: 3vh;
            }
            .subject-button {
                font-size: 2.8vw;
                padding: 1.2vh 1.5vw;
            }
            .close-button {
                font-size: 3vw;
            }
            .map-frame {
                width: 95%;
                max-height: 60vh;
            }
            .map-image {
                max-height: 58vh;
            }
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
                gap: 2vh;
                max-height: 65vh;
                overflow-y: auto; /* Allow scrolling inside the grid if it's too tall on small screens */
                padding-right: 10px;
            }
            .overlay-title {
                font-size: 7vw;
                margin-bottom: 2vh;
                margin-top: 4vh;
            }
            .subject-button {
                font-size: 4.5vw;
                padding: 1.5vh 0;
            }
            .close-button {
                font-size: 5vw;
                top: 2vh;
                right: 5vw;
            }
            .map-frame {
                width: 100%;
                max-height: 55vh;
            }
            .map-image {
                max-height: 53vh;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="title-container">
            <h1>
                <span class="line2">CHERNOBYL</span>
            </h1>
            <h2>TESINA di GABRIELE BRANCIFORTI</h2>
        </div>
        
        <!-- Bottom layout buttons -->
        <div class="button-container">
            <!-- Added id="btn-mappa" to trigger the map display -->
            <a href="#" id="btn-mappa" class="text-button">Mappa</a>
            <!-- Added id="btn-argomenti" to easily trigger the overlay -->
            <a href="#" id="btn-argomenti" class="text-button">Argomenti</a>
            <a href="#" class="text-button">Presentazioni</a>
        </div>
    </div>

    <!-- Mappa conceptual overlay screen -->
    <div id="overlay-mappa" class="overlay">
        <button id="btn-close-mappa" class="close-button">Chiudi</button>
        <h3 class="overlay-title">Mappa Concettuale</h3>
        
        <div class="map-frame">
            <!-- Includes a fallback placeholder in case the local image file hasn't uploaded or matched yet -->
            <img src="mappa.jpg" alt="Mappa Argomenti" class="map-image" onerror="this.onerror=null; this.src='https://placehold.co/1200x800/151515/ffffff?text=La+Mia+Mappa+Concettuale';">
        </div>
    </div>

    <!-- 11 subjects overlay screen -->
    <div id="overlay-menu" class="overlay">
        <button id="btn-close" class="close-button">Chiudi</button>
        <h3 class="overlay-title">Argomenti</h3>
        
        <div class="grid-container">
            <a href="#" class="subject-button">Italiano</a>
            <a href="#" class="subject-button">Storia</a>
            <a href="#" class="subject-button">Geografia</a>
            <a href="#" class="subject-button">Scienze</a>
            <a href="#" class="subject-button">Tecnologia</a>
            <a href="#" class="subject-button">Inglese</a>
            <a href="#" class="subject-button">Francese</a>
            <a href="#" class="subject-button">Arte</a>
            <a href="#" class="subject-button">Musica</a>
            <a href="#" class="subject-button">Ed. Fisica</a>
            <a href="#" class="subject-button">Ed. Civica</a>
        </div>
    </div>

    <script>
        // Argomenti Menu Controller
        const btnArgomenti = document.getElementById('btn-argomenti');
        const btnClose = document.getElementById('btn-close');
        const overlayMenu = document.getElementById('overlay-menu');

        btnArgomenti.addEventListener('click', function(event) {
            event.preventDefault();
            overlayMenu.classList.add('active');
        });

        btnClose.addEventListener('click', function() {
            overlayMenu.classList.remove('active');
        });

        // Mappa Conceptual Map Controller
        const btnMappa = document.getElementById('btn-mappa');
        const btnCloseMappa = document.getElementById('btn-close-mappa');
        const overlayMappa = document.getElementById('overlay-mappa');

        btnMappa.addEventListener('click', function(event) {
            event.preventDefault();
            overlayMappa.classList.add('active');
        });

        btnCloseMappa.addEventListener('click', function() {
            overlayMappa.classList.remove('active');
        });

        // CLICK OUTSIDE TO CLOSE CONTROLLERS
        
        // Mappa Close on Background Click
        overlayMappa.addEventListener('click', function(event) {
            // Check if the clicked target is NOT inside the main content frame and NOT the close button
            if (!event.target.closest('.map-frame') && !event.target.closest('.close-button') && !event.target.closest('.overlay-title')) {
                overlayMappa.classList.remove('active');
            }
        });

        // Argomenti Close on Background Click
        overlayMenu.addEventListener('click', function(event) {
            // Check if the clicked target is NOT inside the grid container, NOT the title, and NOT the close button
            if (!event.target.closest('.grid-container') && !event.target.closest('.close-button') && !event.target.closest('.overlay-title')) {
                overlayMenu.classList.remove('active');
            }
        });
    </script>

</body>
</html>
