<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inglese - Tesina</title>
    <!-- Tailwind CSS for elegant layout and modern design tokens -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth, hardware-accelerated transitions */
        .smooth-transition {
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Fluid typography for heading: locks safely between 2rem and 4rem */
        .fluid-title {
            font-size: clamp(2rem, 4vw + 1rem, 4rem);
            line-height: 1.15;
        }

        /* Fluid typography for subheadings: locks safely between 1.25rem and 2rem */
        .fluid-subtitle {
            font-size: clamp(1.25rem, 2vw + 0.8rem, 2rem);
            line-height: 1.3;
        }

        /* Fluid typography for standard body text: locks safely between 1rem and 1.25rem for perfect readability */
        .fluid-body-text {
            font-size: clamp(1rem, 0.6vw + 0.8rem, 1.25rem);
            line-height: 1.75;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition">

    <!-- Top Navigation / Progress Indicator -->
    <header id="appHeader" class="w-full fixed top-0 left-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-900/80 z-50 smooth-transition">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <span id="logoText" class="text-xs font-mono tracking-widest text-slate-400">ARGOMENTI</span>
            
            <!-- Style Toggles (Theme and Download Options) -->
            <div class="flex items-center gap-2">
                <!-- Download Text File Button -->
                <button onclick="downloadText()" id="downloadBtn" class="p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition" title="Download Text">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </button>

                <!-- Color Theme Toggle -->
                <button onclick="toggleTheme()" id="themeBtn" class="p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition">
                    <!-- Dynamic Icon loaded via JavaScript based on current theme -->
                    <svg id="themeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Scroll Progress Bar -->
        <div class="w-full h-[2px] bg-slate-900/50">
            <div id="progressBar" class="h-full w-0 bg-indigo-500 transition-all duration-100"></div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 w-full max-w-3xl mx-auto px-6 pt-28 pb-16">
        <article id="readingContent" class="space-y-8">
            
            <!-- Article Header -->
            <div id="articleHeader" class="space-y-6 pb-6 border-b border-slate-900 smooth-transition">
                <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                    <div class="space-y-2">
                        <h1 id="headingDisplay" class="fluid-title font-black tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent smooth-transition">
                            Eco-Sustainability
                        </h1>
                        <p id="metaText" class="text-xs font-mono text-indigo-400 uppercase tracking-wider">Inglese</p>
                    </div>

                    <!-- Version Selector Toggle -->
                    <div id="versionContainer" class="flex bg-slate-900 border border-slate-800 rounded-xl p-0.5 self-start md:self-auto smooth-transition">
                        <button onclick="changeVersion('extended')" id="ver-extended" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all duration-300 bg-indigo-600 text-white shadow-md shadow-indigo-600/10">Originale</button>
                        <button onclick="changeVersion('summary')" id="ver-summary" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all duration-300 text-slate-400 hover:text-white">Traduzione</button>
                    </div>
                </div>
            </div>

            <!-- Body Text Block with opacity transition hooks -->
            <div id="bodyDisplay" class="fluid-body-text text-slate-300 space-y-6 opacity-100 transition-opacity duration-300 smooth-transition">
                <!-- Content is loaded and parsed dynamically here -->
            </div>
        </article>
    </main>

    <!-- Bottom Indicator -->
    <footer id="appFooter" class="w-full text-center py-8 text-[10px] text-slate-600 font-mono select-none border-t border-slate-900/60 max-w-4xl mx-auto smooth-transition">
        GABRIELE BRANCIFORTI • TESINA • 3C
    </footer>

    <!-- Scripting Engine Logic -->
    <script>
        // Supported Themes: 'dark', 'light'
        // Supported Versions: 'extended' (original essay), 'summary' (clean book-style summary)
        const state = {
            theme: 'dark',
            version: 'extended'
        };

        // Complete Original Version (Unified into a single, continuous reading stream)
        const extendedData = `The transition to a net-zero energy future is often framed as a binary choice between renewables and nuclear power. However, when evaluated through the lens of system efficiency and technical pragmatism, it becomes clear that nuclear energy is not merely an alternative, it is the indispensable backbone of a truly decarbonized grid.

The argument for prioritizing nuclear energy rests on three fundamental pillars of efficiency:

1. The Myth of Intermittency and Grid Stability
The primary failure of an "all-renewable" strategy is its inability to manage time. Solar and wind are variable by nature, meaning their output fluctuates with the weather and the clock. A grid relying solely on them requires massive, expensive, and resource-heavy storage solutions or, more commonly, "peaker" plants fueled by natural gas to compensate for periods of low production. Nuclear energy, by contrast, operates at a high capacity factor, providing a consistent "baseload" supply. It acts as the anchor of the system, ensuring that when the wind drops or the sun sets, the grid remains stable without resorting to fossil fuels.

2. Unmatched Energy Density and Land Use
The laws of physics dictate that nuclear fuel possesses a power density orders of magnitude higher than any renewable source. A single nuclear facility can produce gigawatts of reliable power while occupying a relatively small footprint. To generate the same amount of electricity using wind or solar, one would need to cover vast tracts of land, necessitating a massive expansion of transmission infrastructure and a greater consumption of raw materials—such as steel, concrete, and rare earth minerals—per terawatt-hour produced. If true ecological sustainability implies minimal land impact and resource exploitation, nuclear is objectively more efficient.

3. Enabling the Industrial Transition
Modern civilization, particularly heavy industry and manufacturing, cannot run on the intermittent, fluctuating supply characteristic of weather-dependent renewables. Achieving deep decarbonization requires not just electricity, but the high-temperature heat and constant, reliable power that only large-scale nuclear reactors can provide. By failing to integrate nuclear power, nations risk locking themselves into a future where economic growth and climate goals are forced into a permanent, unsustainable conflict.

Conclusion: The Case for Synergy
The most efficient path to a sustainable future is not found in choosing between technologies, but in their strategic integration. Nuclear energy provides the "skeleton" of the grid, the reliable, dense, and constant energy foundation—which then allows renewable energy to thrive as a vital complement. To exclude nuclear from the energy mix is not an act of environmental idealism; it is a tactical error that ensures a more fragile, expensive, and fossil-fuel-dependent grid.`;

        // Book-style Textbook Summary (Sintesi Manualistica, schematica e chiara, unificata)
        const summaryData = `La transizione verso un futuro energetico a zero emissioni nette viene spesso presentata come una scelta binaria tra energie rinnovabili ed energia nucleare. Tuttavia, se valutata attraverso la lente dell'efficienza del sistema e del pragmatismo tecnico, diventa chiaro che l'energia nucleare non è semplicemente un'alternativa, ma la spina dorsale indispensabile di una rete elettrica realmente decarbonizzata.

L'argomentazione a favore della priorità dell'energia nucleare si basa su tre pilastri fondamentali di efficienza:

1. Il mito dell'intermittenza e della stabilità della rete
Il principale limite di una strategia "interamente rinnovabile" è la sua incapacità di gestire il tempo. L'energia solare ed eolica sono variabili per natura, il che significa che la loro produzione fluttua in base alle condizioni meteorologiche e all'orologio. Una rete che si affida esclusivamente a queste fonti richiede soluzioni di accumulo massicce, costose e ad alto consumo di risorse o, più comunemente, centrali "di picco" alimentate a gas naturale per compensare i periodi di bassa produzione. L'energia nucleare, al contrario, opera con un elevato fattore di capacità, fornendo un approvvigionamento di "base" costante. Agisce come l'ancora del sistema, garantendo che quando il vento cala o il sole tramonta, la rete rimanga stabile senza ricorrere ai combustibili fossili. 2. Densità energetica e utilizzo del suolo senza pari
Le leggi della fisica impongono che il combustibile nucleare possieda una densità di potenza di ordini di grandezza superiore a qualsiasi fonte rinnovabile. Un singolo impianto nucleare può produrre gigawatt di energia affidabile occupando un'area relativamente ridotta. Per generare la stessa quantità di elettricità utilizzando l'energia eolica o solare, sarebbe necessario coprire vaste aree di terreno, il che richiederebbe un'enorme espansione delle infrastrutture di trasmissione e un maggiore consumo di materie prime – come acciaio, cemento e minerali delle terre rare – per terawattora prodotto. Se la vera sostenibilità ecologica implica un impatto minimo sul territorio e uno sfruttamento ridotto delle risorse, il nucleare è oggettivamente più efficiente.

3. Facilitare la transizione industriale
La civiltà moderna, in particolare l'industria pesante e manifatturiera, non può funzionare con l'approvvigionamento intermittente e fluttuante tipico delle fonti rinnovabili dipendenti dalle condizioni meteorologiche. Raggiungere una profonda decarbonizzazione richiede non solo elettricità, ma anche il calore ad alta temperatura e l'energia costante e affidabile che solo i reattori nucleari di grandi dimensioni possono fornire. Non integrando l'energia nucleare, le nazioni rischiano di precludersi un futuro in cui crescita economica e obiettivi climatici saranno costretti a un conflitto permanente e insostenibile.

Conclusione: La sinergia è fondamentale
Il percorso più efficiente verso un futuro sostenibile non risiede nella scelta tra le tecnologie, ma nella loro integrazione strategica. L'energia nucleare fornisce lo "scheletro" della rete, la base energetica affidabile, densa e costante, che permette poi alle energie rinnovabili di prosperare come complemento vitale. Escludere il nucleare dal mix energetico non è un atto di idealismo ambientalista; è un errore tattico che garantisce una rete più fragile, costosa e dipendente dai combustibili fossili.`;

        const DOM = {
            body: document.body,
            appHeader: document.getElementById('appHeader'),
            logoText: document.getElementById('logoText'),
            themeBtn: document.getElementById('themeBtn'),
            themeIcon: document.getElementById('themeIcon'),
            downloadBtn: document.getElementById('downloadBtn'),
            progressBar: document.getElementById('progressBar'),
            articleHeader: document.getElementById('articleHeader'),
            headingDisplay: document.getElementById('headingDisplay'),
            metaText: document.getElementById('metaText'),
            bodyDisplay: document.getElementById('bodyDisplay'),
            appFooter: document.getElementById('appFooter'),
            versionContainer: document.getElementById('versionContainer'),
            verExtended: document.getElementById('ver-extended'),
            verSummary: document.getElementById('ver-summary')
        };

        // Helper to grab currently selected dataset
        function getCurrentDataset() {
            return state.version === 'summary' ? summaryData : extendedData;
        }

        // Switch version: extended vs textbook summary
        function changeVersion(ver) {
            if (state.version === ver) return;
            state.version = ver;

            // Fade out
            DOM.bodyDisplay.classList.add('opacity-0');

            setTimeout(() => {
                renderBodyText(getCurrentDataset());
                updateVersionButtons();
                
                // Reset scroll to top of reading area smoothly
                const offsetPosition = DOM.articleHeader.offsetTop - 120;
                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });

                // Fade in
                DOM.bodyDisplay.classList.remove('opacity-0');
            }, 300);
        }

        // Automatic content formatting engine for any custom plain text string
        function renderBodyText(textString) {
            if (!DOM.bodyDisplay) return;

            // Clear out the block
            DOM.bodyDisplay.innerHTML = '';

            // Split content into paragraphs using double-newline matching
            const paragraphs = textString.split(/\n\s*\n+/);

            paragraphs.forEach(paraText => {
                const cleanText = paraText.trim();
                if (cleanText) {
                    const p = document.createElement('p');
                    p.className = 'smooth-transition';
                    
                    // Sanitize and translate breaks
                    p.innerHTML = cleanText
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&#039;")
                        .replace(/\n/g, '<br>');
                        
                    DOM.bodyDisplay.appendChild(p);
                }
            });
        }

        // Update version picker styles dynamically
        function updateVersionButtons() {
            const activeClass = "px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all duration-300 bg-indigo-600 text-white shadow-md shadow-indigo-600/10";
            let inactiveClass = "";

            if (state.theme === 'light') {
                inactiveClass = "px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all duration-300 text-slate-500 hover:text-slate-900";
            } else {
                inactiveClass = "px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all duration-300 text-slate-400 hover:text-white";
            }

            if (state.version === 'extended') {
                DOM.verExtended.className = activeClass;
                DOM.verSummary.className = inactiveClass;
            } else {
                DOM.verExtended.className = inactiveClass;
                DOM.verSummary.className = activeClass;
            }
        }

        // Handles plain text compilation and browser download trigger
        function downloadText() {
            const title = DOM.headingDisplay.innerText || DOM.headingDisplay.textContent;
            
            // Reconstruct plain text from structured body elements
            let textContent = "";
            const paragraphs = DOM.bodyDisplay.querySelectorAll('p');
            if (paragraphs.length > 0) {
                paragraphs.forEach(p => {
                    textContent += p.innerText + "\n\n";
                });
            } else {
                textContent = DOM.bodyDisplay.innerText || DOM.bodyDisplay.textContent;
            }

            // Combine title and selected part text into formatted output
            const verName = state.version === 'summary' ? 'TRADUZIONE' : 'ORIGINALE';
            const finalString = `${title.toUpperCase()} - ${verName}\n============================\n\n${textContent.trim()}`;
            
            const blob = new Blob([finalString], { type: "text/plain;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            // Generate slug file name from title
            const fileName = `${title.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')}-${state.version}`;
                
            link.href = url;
            link.setAttribute("download", `${fileName}.txt`);
            document.body.appendChild(link);
            link.click();
            
            // Cleanup
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Tracks reading progress for the interactive bar at the top
        function updateProgressBar() {
            const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            DOM.progressBar.style.width = scrolled + "%";
        }

        window.addEventListener('scroll', updateProgressBar);

        // System Dark/Light Mode Auto-detection Engine
        function detectSystemTheme() {
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            
            // Set initial state based on system preference
            setTheme(systemPrefersDark.matches ? 'dark' : 'light');

            // Listen for system changes in real-time
            systemPrefersDark.addEventListener('change', (e) => {
                setTheme(e.matches ? 'dark' : 'light');
            });
        }

        // Apply a specific theme's visual configuration
        function setTheme(newTheme) {
            state.theme = newTheme;

            if (newTheme === 'light') {
                // Light Paper Theme
                DOM.body.className = "bg-slate-50 text-slate-900 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition";
                DOM.appHeader.className = "w-full fixed top-0 left-0 bg-white/90 backdrop-blur-md border-b border-slate-200/80 z-50 smooth-transition";
                DOM.logoText.className = "text-xs font-mono tracking-widest text-slate-500";
                
                DOM.downloadBtn.className = "p-2 rounded-xl bg-slate-100 border border-slate-200 hover:bg-slate-200 text-slate-500 hover:text-slate-900 transition-all smooth-transition";
                DOM.themeBtn.className = "p-2 rounded-xl bg-slate-100 border border-slate-200 hover:bg-slate-200 text-slate-500 hover:text-slate-900 transition-all smooth-transition";
                DOM.versionContainer.className = "flex bg-slate-100 border border-slate-200 rounded-xl p-0.5 self-start md:self-auto smooth-transition";

                DOM.articleHeader.className = "space-y-6 pb-6 border-b border-slate-200 smooth-transition";
                DOM.headingDisplay.className = "fluid-title font-black tracking-tight bg-gradient-to-r from-slate-900 via-slate-800 to-slate-700 bg-clip-text text-transparent smooth-transition";
                DOM.metaText.className = "text-xs font-mono text-indigo-600 uppercase tracking-wider";
                DOM.bodyDisplay.className = "fluid-body-text text-slate-700 space-y-6 smooth-transition";
                DOM.appFooter.className = "w-full text-center py-8 text-[10px] text-slate-400 font-mono select-none border-t border-slate-200 max-w-4xl mx-auto smooth-transition";
                
                // SVG Moon Icon representing the option to toggle to dark mode
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            } 
            else if (newTheme === 'dark') {
                // Classic Dark Mode (Slate-950)
                DOM.body.className = "bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-indigo-500 selection:text-white font-sans smooth-transition";
                DOM.appHeader.className = "w-full fixed top-0 left-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-900/80 z-50 smooth-transition";
                DOM.logoText.className = "text-xs font-mono tracking-widest text-slate-400";
                
                DOM.downloadBtn.className = "p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition";
                DOM.themeBtn.className = "p-2 rounded-xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 hover:text-white transition-all smooth-transition";
                DOM.versionContainer.className = "flex bg-slate-900 border border-slate-800 rounded-xl p-0.5 self-start md:self-auto smooth-transition";

                DOM.articleHeader.className = "space-y-6 pb-6 border-b border-slate-900 smooth-transition";
                DOM.headingDisplay.className = "fluid-title font-black tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent smooth-transition";
                DOM.metaText.className = "text-xs font-mono text-indigo-400 uppercase tracking-wider";
                DOM.bodyDisplay.className = "fluid-body-text text-slate-300 space-y-6 smooth-transition";
                DOM.appFooter.className = "w-full text-center py-8 text-[10px] text-slate-600 font-mono select-none border-t border-slate-900/60 max-w-4xl mx-auto smooth-transition";
                
                // SVG Sun Icon representing the option to toggle to light mode
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>`;
            } 
            updateVersionButtons();
        }

        // Cycle manually triggered by clicking the top right icon (only Dark and Light)
        function toggleTheme() {
            if (state.theme === 'light') {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }

        // Initialize progress, format text, and load rendering
        window.onload = function() {
            renderBodyText(getCurrentDataset()); // Render continuous essay text on launch
            updateProgressBar();
            detectSystemTheme(); // Auto-detect and set initial mode
        };
    </script>
</body>
</html>
